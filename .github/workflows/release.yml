name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          for ARCH in arm64 amd64; do
            WORKDIR="dist/chatbox_darwin_${ARCH}"
            mkdir -p "${WORKDIR}"

            GOOS=darwin GOARCH="${ARCH}" \
              go build -ldflags "-X chatbox/internal/version.Version=${VERSION}" \
              -o "${WORKDIR}/chatbox" ./cmd/chatbox

            tar -C "${WORKDIR}" -czf "dist/chatbox_darwin_${ARCH}.tar.gz" chatbox
          done

          shasum -a 256 \
            dist/chatbox_darwin_arm64.tar.gz \
            dist/chatbox_darwin_amd64.tar.gz \
            > dist/checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/chatbox_darwin_arm64.tar.gz
            dist/chatbox_darwin_amd64.tar.gz
            dist/checksums.txt
