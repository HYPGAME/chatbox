name: edge-release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  edge-release:
    runs-on: macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compute edge release metadata
        id: edge
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7 | tr '[:upper:]' '[:lower:]')"
          echo "tag=edge-${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "version=edge-${SHORT_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Build edge release archives
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.edge.outputs.version }}"
          mkdir -p dist

          for ARCH in arm64 amd64; do
            WORKDIR="dist/chatbox_darwin_${ARCH}"
            mkdir -p "${WORKDIR}"

            GOOS=darwin GOARCH="${ARCH}" \
              go build -ldflags "-X chatbox/internal/version.Version=${VERSION}" \
              -o "${WORKDIR}/chatbox" ./cmd/chatbox

            tar -C "${WORKDIR}" -czf "dist/chatbox_darwin_${ARCH}.tar.gz" chatbox
          done

          ANDROID_WORKDIR="dist/chatbox_android_arm64"
          mkdir -p "${ANDROID_WORKDIR}"

          GOOS=android GOARCH=arm64 \
            go build -ldflags "-X chatbox/internal/version.Version=${VERSION}" \
            -o "${ANDROID_WORKDIR}/chatbox" ./cmd/chatbox

          tar -C "${ANDROID_WORKDIR}" -czf "dist/chatbox_android_arm64.tar.gz" chatbox

          (
            cd dist
            shasum -a 256 \
              chatbox_darwin_arm64.tar.gz \
              chatbox_darwin_amd64.tar.gz \
              chatbox_android_arm64.tar.gz
          ) > dist/checksums.txt

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.edge.outputs.tag }}
          name: ${{ steps.edge.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/chatbox_darwin_arm64.tar.gz
            dist/chatbox_darwin_amd64.tar.gz
            dist/chatbox_android_arm64.tar.gz
            dist/checksums.txt
